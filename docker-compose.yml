services:
  dock_guard:
    build: .
    image: dock-guard:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      # 设计 §0.4 + §15.10: 现场回放走兄弟服务的录制目录
      - ../sim_dji_cloud_service/sim_dji_cloud/recordings:/recordings:ro
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
