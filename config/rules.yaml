# config/rules.yaml — Phase 4 启动子集 (设计 §5.3)
# 所有规则只产生告警, 任何 level 都不下发指令 (设计 §5.4).
#
# ⚠️ 当前阈值为 "demo 模式" — 故意调低以便钉钉群常有告警可观察.
# 注释 (orig: ...) 给出 spec 锁定的生产阈值, 上线前必须还原.
# 还原方法: 一行行把 value 改回 orig, 然后 ./run.sh admin reload.

version: 2

defaults:
  cooldown_ms: 30000
  dwell_enter_ms: 0
  dwell_exit_ms: 0

# ── 起飞前硬条件 ────────────────────────────────────────────────────
preflight_block:
  - id: preflight.wind_exceeded
    desc: 起飞前阵风窗口峰值超阈值
    phase: [PREFLIGHT]
    all:
      - { fact: wind_gust_max_30s, op: ">", value: 3.0 }   # orig: 12.0 m/s
    verdict:
      level: block
      code: PREFLIGHT_WIND_EXCEEDED
      suggested_action: reject_takeoff

  - id: preflight.dock_tilt
    desc: 起飞前机场倾角异常
    phase: [PREFLIGHT]
    all:
      - { fact: tilt_angle_valid, op: "==", value: 1 }
      - { fact: tilt_angle_value, op: ">", value: 0.5 }    # orig: 3.0 度
    verdict:
      level: block
      code: PREFLIGHT_DOCK_TILT
      suggested_action: reject_takeoff

  - id: preflight.rtk_not_fixed
    desc: 起飞前 RTK 未收敛
    phase: [PREFLIGHT]
    all:
      - { fact: rtk_fixed, op: "==", value: false }
    verdict:
      level: block
      code: PREFLIGHT_RTK_NOT_FIXED
      suggested_action: reject_takeoff

  - id: preflight.cover_anomaly
    desc: 起飞前舱门异常 (cover_state=3 Abnormal)
    phase: [PREFLIGHT]
    all:
      - { fact: cover_state, op: "==", value: 3 }
    verdict:
      level: block
      code: PREFLIGHT_COVER_ANOMALY
      suggested_action: reject_takeoff

  - id: preflight.emergency_stop_pressed
    desc: 机场急停按钮按下
    phase: [PREFLIGHT]
    all:
      - { fact: emergency_stop_pressed, op: "==", value: true }
    verdict:
      level: block
      code: PREFLIGHT_EMERGENCY_STOP_PRESSED
      suggested_action: reject_takeoff

  - id: preflight.heavy_rain
    desc: 起飞前降雨
    phase: [PREFLIGHT]
    all:
      - { fact: rainfall, op: ">=", value: 1 }              # orig: 3 (heavy); DJI 枚举 0/1/2/3
    verdict:
      level: block
      code: PREFLIGHT_HEAVY_RAIN
      suggested_action: reject_takeoff

# ── 飞行中环境恶化 ────────────────────────────────────────────────────
inflight_escalate:
  - id: inflight.wind_gust
    desc: 飞行中阵风窗口峰值超阈值
    phase: [TAKEOFF, CRUISE, AVOIDANCE]
    all:
      - { fact: wind_gust_max_30s, op: ">", value: 4.0 }    # orig: 14.0 m/s
    dwell_enter_ms: 0                                       # orig: 3000 (持续 3s 才告)
    verdict:
      level: return
      code: INFLIGHT_WIND_GUST
      suggested_action: return_home

  - id: inflight.battery_low
    desc: 飞行中电量低于阈值
    phase: [TAKEOFF, CRUISE, AVOIDANCE]
    all:
      - { fact: battery_capacity_percent, op: "<=", value: 95 }   # orig: fact_ref battery_return_home_power (~30%)
    verdict:
      level: return
      code: INFLIGHT_BATTERY_LOW
      suggested_action: return_home

  - id: inflight.heavy_rain
    desc: 飞行中降雨升级
    phase: [TAKEOFF, CRUISE, AVOIDANCE]
    all:
      - { fact: rainfall, op: ">=", value: 1 }              # orig: 3
    verdict:
      level: return
      code: INFLIGHT_HEAVY_RAIN
      suggested_action: return_home

# ── 运维顾问 ─────────────────────────────────────────────────────────
maintenance_advisory:
  - id: maint.warming_up
    desc: 系统冷启动 warming_up 期内
    all:
      - { fact: warming_up, op: "==", value: true }
    cooldown_ms: 60000                                      # orig: 86400000 (24h, 防天天提醒)
    verdict:
      level: info
      code: WARMING_UP
      suggested_action: notify

  - id: maint.dock_alarm
    desc: 机场声光告警激活
    all:
      - { fact: dock_alarm_state, op: "==", value: 1 }
    verdict:
      level: warn
      code: DOCK_AUDIO_VISUAL_ALARM
      suggested_action: investigate
